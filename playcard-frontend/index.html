<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playcard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: #fff;
  color: #1a1a1a;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.hidden { display: none !important; }

/* --- Idle screen --- */

.idle-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
}

.idle-content {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.brand {
  font-size: 3rem;
  font-weight: 300;
  letter-spacing: 0.04em;
  color: #1a1a1a;
}

.subtitle {
  font-size: 1rem;
  color: #888;
  margin-bottom: 16px;
}

.idle-actions {
  display: flex;
  gap: 12px;
}

.error-msg {
  display: none;
  color: #c0392b;
  font-size: 0.85rem;
  max-width: 340px;
  text-align: center;
  line-height: 1.5;
}

.error-msg.visible { display: block; }

/* --- Placard --- */

.placard {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  z-index: 0;
}

.placard-content {
  max-width: 620px;
  width: 100%;
}

.placard-content h1 {
  font-size: 2.4rem;
  font-weight: 700;
  line-height: 1.15;
  margin-bottom: 6px;
}

.placard-content h2.artist {
  font-size: 1.45rem;
  font-weight: 400;
  font-style: italic;
  line-height: 1.3;
  margin-bottom: 14px;
}

.placard-content h3 {
  font-size: 0.8rem;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #666;
  margin-bottom: 24px;
}

.placard-content p {
  font-size: 1.05rem;
  line-height: 1.75;
  color: #1a1a1a;
}

.placard-content p.raw-text {
  white-space: pre-wrap;
  font-size: 1.2rem;
  line-height: 1.6;
}

.placard-content p.error-display {
  color: #c0392b;
  font-size: 0.9rem;
}

.placard-content p.empty-display {
  color: #aaa;
  font-style: italic;
}



/* --- Loading dots --- */

.loading-dots {
  display: flex;
  gap: 2px;
  font-size: 1.5rem;
  color: #aaa;
}

.loading-dots span {
  animation: dot-fade 1.4s infinite;
}

.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dot-fade {
  0%, 80%, 100% { opacity: 0.2; }
  40% { opacity: 0.8; }
}

/* --- Hover zone (top-right) --- */

.hover-zone {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10;
  opacity: 0.15;
  transition: opacity 0.3s ease;
}

.hover-zone:hover,
.hover-zone.open {
  opacity: 1;
}

.hover-panel {
  background: rgba(255, 255, 255, 0.95);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
  min-width: 160px;
}

.status-line {
  font-size: 0.75rem;
  color: #888;
  white-space: nowrap;
}

.hover-actions {
  display: flex;
  gap: 6px;
}

@media (hover: none) {
  .hover-zone { opacity: 0.25; }
}

/* --- Buttons --- */

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s, color 0.2s, opacity 0.2s;
}

.btn-primary {
  background: #1a1a1a;
  color: #fff;
}

.btn-primary:hover {
  background: #333;
}

.btn-outline {
  background: transparent;
  color: #666;
  border: 1px solid #ccc;
}

.btn-outline:hover {
  color: #1a1a1a;
  border-color: #999;
}

.btn-outline-sm {
  background: transparent;
  color: #888;
  border: 1px solid #ddd;
  padding: 5px 12px;
  font-size: 0.8rem;
  border-radius: 5px;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.2s, color 0.2s;
}

.btn-outline-sm:hover {
  background: #f5f5f5;
  color: #333;
}

/* --- Debug overlay --- */

.debug-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.2);
  z-index: 20;
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
}

.debug-panel {
  width: 380px;
  max-width: 90vw;
  height: 100vh;
  background: #fff;
  padding: 28px 24px;
  overflow-y: auto;
  border-left: 1px solid #e0e0e0;
  box-shadow: -2px 0 16px rgba(0, 0, 0, 0.06);
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.debug-panel h2 {
  font-size: 1.1rem;
  font-weight: 600;
  color: #1a1a1a;
}

.debug-panel label {
  font-size: 0.8rem;
  font-weight: 500;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.debug-panel textarea {
  width: 100%;
  min-height: 200px;
  resize: vertical;
  padding: 10px 12px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-family: inherit;
  font-size: 0.82rem;
  line-height: 1.55;
  color: #1a1a1a;
  background: #fafafa;
  outline: none;
  transition: border-color 0.2s;
}

.debug-panel textarea:focus {
  border-color: #999;
}

.debug-panel input[type="text"] {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
  font-size: 0.78rem;
  color: #1a1a1a;
  background: #fafafa;
  outline: none;
  transition: border-color 0.2s;
}

.debug-panel input[type="text"]:focus {
  border-color: #999;
}

.debug-panel input[type="range"] {
  width: 100%;
  accent-color: #1a1a1a;
}

.toggle-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.toggle-row span {
  font-size: 0.85rem;
  color: #555;
}

.slider-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.slider-row input[type="range"] {
  flex: 1;
}

.slider-row span {
  font-size: 0.85rem;
  color: #555;
  min-width: 32px;
  text-align: right;
}

/* --- Small screen adjustments --- */

@media (max-width: 600px) {
  .placard { padding: 24px; }

  .placard-content h1 { font-size: 1.8rem; }
  .placard-content h2.artist { font-size: 1.2rem; }
  .placard-content h3 { font-size: 0.7rem; }
  .placard-content p { font-size: 0.95rem; }

  .hover-zone {
    top: 10px;
    right: 10px;
  }

  .debug-panel {
    width: 100vw;
    max-width: 100vw;
  }
}
</style>
</head>
<body>

<video id="webcamVideo" autoplay playsinline muted style="display:none;"></video>
<canvas id="webcamCanvas" style="display:none;"></canvas>

<div id="idleScreen" class="idle-screen">
  <div class="idle-content">
    <h1 class="brand">Playcard</h1>
    <p class="subtitle">A dynamic museum placard</p>
    <div class="idle-actions">
      <button id="startBtn" class="btn btn-primary">Start</button>
      <button id="debugBtnIdle" class="btn btn-outline">Debug</button>
    </div>
    <div id="idleError" class="error-msg"></div>
  </div>
</div>

<div id="placard" class="placard hidden">
  <div id="placardContent" class="placard-content"></div>
</div>

<div id="hoverZone" class="hover-zone hidden">
  <div class="hover-panel">
    <span id="statusLine" class="status-line">● Live</span>
    <div class="hover-actions">
      <button id="stopBtn" class="btn-outline-sm">Stop</button>
      <button id="debugBtn" class="btn-outline-sm">Debug</button>
    </div>
  </div>
</div>

<div id="debugOverlay" class="debug-overlay hidden">
  <div class="debug-panel">
    <h2>Settings</h2>

    <label for="promptEl">Prompt</label>
    <textarea id="promptEl"></textarea>

    <div class="toggle-row">
      <input type="checkbox" id="structuredToggle">
      <span>Structured output (JSON schema)</span>
    </div>

    <label>Capture rate</label>
    <div class="slider-row">
      <input type="range" id="captureRate" min="2" max="30" value="4" step="1">
      <span id="captureRateValue">4s</span>
    </div>

    <label for="backendUrl">Backend URL</label>
    <input type="text" id="backendUrl">

    <button id="closeDebug" class="btn btn-primary" style="margin-top:8px;">Close</button>
  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// Constants
// ---------------------------------------------------------------------------

const DEFAULT_URL = 'https://modal-labs-charles-dev--playcard-backend-vlmserver.us-west.modal.direct';

const DEFAULT_PROMPT = String.raw`The attached images were taken by a webcam pointing at an exhibition in San Francisco's Gray Area art space.


Your goal is to write something that will be displayed on a placard beneath the webcam. The placard should act as a dynamic description of its environment. Its contents should be pretentious, laden with the argot of the gallery. It should appear as much as possible to be a description of a real piece of art in the exhibition.

Not more than two paragraphs of description.

Be playful, be funny, be wry, be allusive, don't be cruel.

The webcam and the captured image are not visible to the attendees.`;

const MAX_BUFFER_SIZE = 4;
const RETRY_TIMEOUT_MS = 5 * 60 * 1000;
const BASE_DELAY_MS = 1000;
const MAX_DELAY_MS = 5000;

const STRUCTURED_SCHEMA = {
  type: 'json_schema',
  json_schema: {
    name: 'playcard',
    strict: true,
    schema: {
      type: 'object',
      properties: {
        title: { type: 'string' },
        artist_name: { type: 'string' },
        medium: { type: 'string' },
        description: { type: 'string' },
      },
      required: ['title', 'artist_name', 'medium', 'description'],
      additionalProperties: false,
    },
  },
};

// ---------------------------------------------------------------------------
// DOM refs
// ---------------------------------------------------------------------------

const $ = function (id) { return document.getElementById(id); };

var idleScreen = $('idleScreen');
var placard = $('placard');
var placardContent = $('placardContent');
var hoverZone = $('hoverZone');
var statusLine = $('statusLine');
var debugOverlay = $('debugOverlay');
var idleError = $('idleError');
var webcamVideo = $('webcamVideo');
var webcamCanvas = $('webcamCanvas');

var startBtn = $('startBtn');
var stopBtn = $('stopBtn');
var debugBtn = $('debugBtn');
var debugBtnIdle = $('debugBtnIdle');
var closeDebug = $('closeDebug');
var promptEl = $('promptEl');
var structuredToggle = $('structuredToggle');
var captureRate = $('captureRate');
var captureRateValue = $('captureRateValue');
var backendUrl = $('backendUrl');

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------

var webcamStream = null;
var captureTimer = null;
var frameBuffer = [];
var latestRequestId = 0;
var displayedRequestId = 0;
var currentAbortController = null;
var lastResponseTime = null;
var isRunning = false;

// ---------------------------------------------------------------------------
// Persistence
// ---------------------------------------------------------------------------

function loadSettings() {
  promptEl.value = localStorage.getItem('playcard-prompt') || DEFAULT_PROMPT;
  structuredToggle.checked = localStorage.getItem('playcard-structured') !== 'false';
  captureRate.value = parseInt(localStorage.getItem('playcard-captureRate'), 10) || 4;
  captureRateValue.textContent = captureRate.value + 's';
  backendUrl.value = localStorage.getItem('playcard-backendUrl') || DEFAULT_URL;
}

function saveSettings() {
  localStorage.setItem('playcard-prompt', promptEl.value);
  localStorage.setItem('playcard-structured', structuredToggle.checked);
  localStorage.setItem('playcard-captureRate', captureRate.value);
  localStorage.setItem('playcard-backendUrl', backendUrl.value.trim());
}

captureRate.addEventListener('input', function () {
  captureRateValue.textContent = captureRate.value + 's';
});

[promptEl, structuredToggle, captureRate, backendUrl].forEach(function (el) {
  el.addEventListener('input', saveSettings);
  el.addEventListener('change', saveSettings);
});

// ---------------------------------------------------------------------------
// Webcam life cycle
// ---------------------------------------------------------------------------

startBtn.addEventListener('click', startCapture);
stopBtn.addEventListener('click', stopCapture);

function startCapture() {
  navigator.mediaDevices.getUserMedia({
    video: { width: { ideal: 640 }, height: { ideal: 480 }, aspectRatio: 4 / 3 },
  }).then(function (stream) {
    webcamStream = stream;
    webcamVideo.srcObject = stream;
    console.log('webcam started, waiting for playing event');

    idleScreen.classList.add('hidden');
    idleError.classList.remove('visible');
    placard.classList.remove('hidden');
    hoverZone.classList.remove('hidden');
    hoverZone.classList.remove('open');

    frameBuffer = [];
    latestRequestId = 0;
    displayedRequestId = 0;
    lastResponseTime = null;
    isRunning = true;

    var intervalMs = parseInt(captureRate.value, 10) * 1000;
    var canvas = webcamCanvas;
    var ctx = canvas.getContext('2d');

    function capture() {
      if (!isRunning || !webcamStream) return;
      if (webcamVideo.videoWidth === 0) { console.log('capture: videoWidth 0, skipping'); return; }

      canvas.width = webcamVideo.videoWidth;
      canvas.height = webcamVideo.videoHeight;
      ctx.drawImage(webcamVideo, 0, 0, canvas.width, canvas.height);

      if (isBlackFrame(ctx, canvas.width, canvas.height)) return;

      var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      frameBuffer.push(dataUrl);
      while (frameBuffer.length > MAX_BUFFER_SIZE) frameBuffer.shift();

      latestRequestId++;
      currentAbortController = new AbortController();
      updateStatus();
      sendFrames([].concat(frameBuffer), latestRequestId, currentAbortController.signal);
    }

    webcamVideo.addEventListener('playing', function () {
      console.log('video playing event fired, scheduling capture');
      requestAnimationFrame(function () {
        capture();
        captureTimer = setInterval(capture, intervalMs);
      });
    }, { once: true });

    updateStatus();
  }).catch(function (e) {
    idleError.textContent = 'Could not access webcam: ' + e.message;
    idleError.classList.add('visible');
  });
}

function stopCapture() {
  isRunning = false;

  if (captureTimer) {
    clearInterval(captureTimer);
    captureTimer = null;
  }

  if (currentAbortController) {
    currentAbortController.abort();
    currentAbortController = null;
  }

  if (webcamStream) {
    webcamStream.getTracks().forEach(function (t) { t.stop(); });
    webcamStream = null;
  }

  webcamVideo.srcObject = null;
  frameBuffer = [];

  placard.classList.add('hidden');
  hoverZone.classList.add('hidden');
  idleScreen.classList.remove('hidden');
}

// ---------------------------------------------------------------------------
// Frame helpers
// ---------------------------------------------------------------------------

function isBlackFrame(ctx, w, h) {
  var imageData = ctx.getImageData(0, 0, w, h);
  var data = imageData.data;
  for (var i = 0; i < data.length; i += 16) {
    if (data[i] > 10 || data[i + 1] > 10 || data[i + 2] > 10) return false;
  }
  return true;
}

// ---------------------------------------------------------------------------
// Status line
// ---------------------------------------------------------------------------

function updateStatus() {
  if (!isRunning) return;
  var parts = ['● Live'];
  if (frameBuffer.length) {
    parts.push(frameBuffer.length + ' frame' + (frameBuffer.length !== 1 ? 's' : ''));
  }
  if (lastResponseTime !== null) {
    parts.push(Math.round((Date.now() - lastResponseTime) / 1000) + 's ago');
  }
  statusLine.textContent = parts.join(' · ');
}

// ---------------------------------------------------------------------------
// API calls
// ---------------------------------------------------------------------------

function sendFrames(frames, id, signal) {
  var url = backendUrl.value.trim();
  if (!url) { console.log('sendFrames: no URL'); return; }

  var prompt = promptEl.value.trim();
  if (!prompt) { console.log('sendFrames: no prompt'); return; }

  console.log('sendFrames', { id, frames: frames.length, url: url.slice(0, 50) + '...', promptLen: prompt.length });

  var content = frames.map(function (dataUrl) {
    return { type: 'image_url', image_url: { url: dataUrl } };
  });
  content.push({ type: 'text', text: prompt });

  var body = {
    messages: [{ role: 'user', content: content }],
    stream: true,
    top_k: 20,
    temperature: 0.8,
  };

  if (structuredToggle.checked) {
    body.response_format = STRUCTURED_SCHEMA;
  }

  if (displayedRequestId === 0) showLoading();
  setStatus('');

  fetchWithRetry(url, body, signal).then(function (resp) {
    return streamResponse(resp);
  }).then(function (text) {
    console.log('streamResponse done', { id, latestRequestId, displayedRequestId, textLen: text.length, preview: text.slice(0, 120) });
    if (id <= displayedRequestId) { console.log('stale response, discarding'); return; }
    displayedRequestId = id;
    setStatus('ok');
    lastResponseTime = Date.now();
    updateStatus();
    renderResponse(text);
  }).catch(function (err) {
    console.log('sendFrames error', { errName: err.name, errMsg: err.message, id, displayedRequestId });
    if (err.name === 'AbortError') return;
    if (id <= displayedRequestId) return;
    setStatus('err');
    lastResponseTime = Date.now();
    updateStatus();
    renderResponse(null, err.message);
  });
}

function fetchWithRetry(url, body, signal) {
  var deadline = Date.now() + RETRY_TIMEOUT_MS;
  var attempt = 0;

  function tryFetch() {
    attempt++;
    return fetch(url + '/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'text/event-stream',
      },
      body: JSON.stringify(body),
      signal: signal,
    }).then(function (resp) {
      if (resp.status === 503) {
        if (Date.now() >= deadline) {
          return resp.text().then(function (t) {
            throw new Error('HTTP 503: retry deadline exceeded');
          });
        }
        return sleep(Math.min(BASE_DELAY_MS * Math.pow(2, attempt - 1), MAX_DELAY_MS), signal).then(tryFetch);
      }

      if (!resp.ok) {
        return resp.text().then(function (t) {
          throw new Error('HTTP ' + resp.status + ': ' + t.slice(0, 300));
        });
      }

      return resp;
    }).catch(function (err) {
      if (err.name === 'AbortError') throw err;
      if (err instanceof TypeError) {
        if (Date.now() >= deadline) throw new Error('Server unreachable after 5 minutes');
        return sleep(Math.min(BASE_DELAY_MS * Math.pow(2, attempt - 1), MAX_DELAY_MS), signal).then(tryFetch);
      }
      throw err;
    });
  }

  return tryFetch();
}

function streamResponse(resp) {
  var reader = resp.body.getReader();
  var decoder = new TextDecoder();
  var buffer = '';
  var text = '';

  function read() {
    return reader.read().then(function (chunk) {
      if (chunk.done) return text;

      buffer += decoder.decode(chunk.value, { stream: true });
      var lines = buffer.split('\n');
      buffer = lines.pop();

      for (var i = 0; i < lines.length; i++) {
        var trimmed = lines[i].trim();
        if (!trimmed || trimmed.indexOf('data:') !== 0) continue;

        var data = trimmed.slice(5).trim();
        if (data === '[DONE]') continue;

        try {
          var parsed = JSON.parse(data);
          var content = (parsed.choices || [{}])[0].delta || {};
          content = content.content || '';
          if (content) text += content;
        } catch (_) {}
      }

      return read();
    });
  }

  return read();
}

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------

function showLoading() {
  placardContent.innerHTML = '<div class="loading-dots"><span>.</span><span>.</span><span>.</span></div>';
}

function renderResponse(text, errorMsg) {
  console.log('renderResponse', { hasText: !!text, textLen: text ? text.length : 0, errorMsg, structuredOn: structuredToggle.checked });
  if (errorMsg) {
    placardContent.innerHTML = '<p class="error-display">' + escapeHtml(errorMsg) + '</p>';
    return;
  }

  if (!text || !text.trim()) {
    placardContent.innerHTML = '<p class="empty-display">(No response)</p>';
    return;
  }

  text = text.trim();

  if (structuredToggle.checked) {
    try {
      var data = JSON.parse(text);
      if (data && typeof data === 'object' && data.title && data.artist_name && data.medium && data.description) {
        placardContent.innerHTML =
          '<h1>' + escapeHtml(data.title) + '</h1>' +
          '<h2 class="artist">' + escapeHtml(data.artist_name) + '</h2>' +
          '<h3>' + escapeHtml(data.medium) + '</h3>' +
          '<p>' + escapeHtml(data.description).replace(/\n/g, '<br>') + '</p>';
        return;
      }
    } catch (_) {}
  }

  placardContent.innerHTML = '<p class="raw-text">' + escapeHtml(text) + '</p>';
}

// ---------------------------------------------------------------------------
// Debug overlay
// ---------------------------------------------------------------------------

function openDebug() {
  debugOverlay.classList.remove('hidden');
}

function closeDebugOverlay() {
  debugOverlay.classList.add('hidden');
}

debugBtn.addEventListener('click', openDebug);
debugBtnIdle.addEventListener('click', openDebug);
closeDebug.addEventListener('click', closeDebugOverlay);

debugOverlay.addEventListener('click', function (e) {
  if (e.target === debugOverlay) closeDebugOverlay();
});

document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape' && !debugOverlay.classList.contains('hidden')) {
    closeDebugOverlay();
  }
});

// ---------------------------------------------------------------------------
// Hover zone tap for mobile
// ---------------------------------------------------------------------------

hoverZone.addEventListener('click', function (e) {
  if (e.target === hoverZone) {
    hoverZone.classList.toggle('open');
  }
});

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------

function sleep(ms, signal) {
  return new Promise(function (resolve, reject) {
    var timer = setTimeout(resolve, ms);
    if (signal) {
      signal.addEventListener('abort', function () {
        clearTimeout(timer);
        reject(Object.assign(new Error('Aborted'), { name: 'AbortError' }));
      }, { once: true });
    }
  });
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function setStatus(state) {
  // Use the status line dot color to indicate connection health
  if (state === 'ok') {
    statusLine.style.color = '#2e7d32';
  } else if (state === 'err') {
    statusLine.style.color = '#c0392b';
  } else {
    statusLine.style.color = '';
  }
}

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------

loadSettings();
</script>
</body>
</html>
